<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Dice Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>QR Code Dice Generator</h1>
        
        <div class="input-group">
            <label for="url-input">Enter URL:</label>
            <input type="text" id="url-input" placeholder="https://example.com">
        </div>
        
        <div class="input-group">
            <label for="size-input">QR Code Size (px):</label>
            <input type="number" id="size-input" min="100" max="1000" value="300">
        </div>
        
        <div class="input-group">
            <label for="padding-input">Padding (px):</label>
            <input type="number" id="padding-input" min="0" max="500" value="100">
        </div>
        
        <button id="generate-btn">Generate QR Code</button>
        
        <div class="qr-container">
            <canvas id="qr-canvas"></canvas>
        </div>
        
        <button id="download-btn" disabled>Download QR Code</button>
        
        <div class="info">
            <p>Note: The padding will be added when downloading the QR code.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
